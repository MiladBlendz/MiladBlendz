<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiladBlendz</title>

<!-- CALENDLY -->
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<script src="https://assets.calendly.com/assets/external/widget.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 14px 16px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(18px);
    z-index: 9999;
}

nav .logo {
    position: absolute;
    left: 16px;
    font-weight: 700;
    font-size: 15px;
}

nav a {
    color: white;
    text-decoration: none;
    font-size: 12px;
    margin: 0 8px;
    padding: 6px 10px;
    border-radius: 10px;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("kuva4.jpg") center/cover no-repeat;
    display: flex;
    align-items: flex-end;
    padding: 40px 20px;
    position: relative;
}

.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, black, transparent);
}

.hero-content {
    position: relative;
}

.hero h1 {
    font-size: 44px;
    margin: 0;
}

.hero p {
    color: #bbb;
    font-size: 14px;
}

/* FLOAT BUTTON */
.fab {
    position: fixed;
    bottom: 18px;
    right: 18px;
    background: white;
    color: black;
    padding: 14px 18px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    z-index: 200;
    transition: 0.3s;
}

.fab:hover {
    transform: scale(1.08);
}

/* SECTIONS */
.section {
    padding: 60px 16px;
}

/* SERVICES */
.services {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}

.service {
    background: rgba(255,255,255,0.05);
    padding: 16px;
    border-radius: 14px;
}

/* VIDEO */
.video-feed {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.video {
    width: 100%;
    aspect-ratio: 9/16;
    border-radius: 18px;
    object-fit: cover;
}

/* SOCIAL */
.social {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.social a {
    background: rgba(255,255,255,0.08);
    padding: 14px;
    border-radius: 14px;
    text-align: center;
    color: white;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px 20px;
    color: #666;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">MiladBlendz</div>
    <a href="#services">Palvelut</a>
    <a href="#videos">Työt</a>
</nav>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>MiladBlendz</h1>
        <p>Clean fades • Modern barber experience</p>
    </div>
</div>

<!-- SERVICES -->
<div class="section" id="services">
    <h2>Palvelut</h2>

    <div class="services">
        <div class="service">Fade – 10€</div>
        <div class="service">Saksityö +5€</div>
        <div class="service">Nofade – 10€</div>
        <div class="service">Designit – 0€</div>
    </div>
</div>

<!-- VIDEOT -->
<div class="section" id="videos">
    <h2>Työt</h2>

    <div class="video-feed">

        <video class="video" autoplay muted loop playsinline>
            <source src="video1.mp4" type="video/mp4">
        </video>

        <video class="video" autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>

        <video class="video" autoplay muted loop playsinline>
            <source src="video3.mp4" type="video/mp4">
        </video>

    </div>
</div>

<!-- SOCIAL -->
<div class="section">
    <h2>Yhteystiedot</h2>

    <div class="social">
        <a href="https://instagram.com/milad.blendz">Instagram</a>
        <a href="https://tiktok.com/@miladblendz">TikTok</a>
    </div>

    <p style="color:#666; margin-top:10px;">Snapchat: MiladBlendz</p>
</div>

<footer>
    © 2026 MiladBlendz
</footer>

<!-- 🔥 CALENDLY BUTTON -->
<a href="#" onclick="Calendly.initPopupWidget({url: 'https://calendly.com/miladblendz/haircut'});return false;" class="fab">
    Varaa aika
</a>

</body>
</html>
